
<html>
  <body>
    
    <script>
      (async () => {
        const response = await fetch('https://api.github.com/repos/prodipto27/prodipto27.github.io/contents/syllabus');
        const pathname = window.location.pathname.replace(/\/syllabus/, '');
        const data = await response.json();
        let htmlString = '<br/><br/><br/><ul>';
        for (let file of data) {
          htmlString += `<li><a target="_blank" href="https://prodipto27.github.io/${file.path}">${file.name}</a></li>`;
        }
        htmlString += '</ul>';
        document.getElementsByTagName('body')[0].innerHTML = htmlString;
      })()
    </script>
  <body>
</html>
