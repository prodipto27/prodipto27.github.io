  <script>
    parent.postMessage("changeTitle", "*");
    function showSnack(str) {
      parent.postMessage("showSnack | " + str, "*");
      console.log(str);
    }

    function openSyllabus(filename) {
      showSnack('ফাইল ওপেন হচ্ছে...');
      setTimeout(function () {
        window.open(encodeURI("../pdfviewer/web/viewer.html?file=../../syllabus/" + filename), "_blank")
      }, 2000);
    }
  </script>
