    <script>
        function openBook(filename, i) {
            showSnackbar('সংগ্রহে - ' + credits[i], 'ঠিকাছে');

                window.open(encodeURI("../pdfviewer/web/viewer.html?file=../../books/" + filename), "_blank");

        }
