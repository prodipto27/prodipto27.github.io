
<html>
  <body>
    <script>
      (async () => {
        const response = await fetch('https://api.github.com/repos/prodipto27/prodipto27.github.io/contents/books');
        //const pathname = window.location.pathname.replace(/\/syllabus/, '');
        const data = await response.json();
        let htmlString = '<ul>';
        for (let file of data) {
          htmlString += `<li><a href="https://prodipto27.github.io/${file.path}">${file.name}</a></li>`;
        }
        htmlString += '</ul>';
        document.getElementsByTagName('body')[0].innerHTML = htmlString;
      })()
    </script>
  <body>
</html>
